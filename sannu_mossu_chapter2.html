<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sannu &amp; Mossu: Echoes of Destiny — Chapter 2</title>
<meta name="description" content="Sannu and Mossu reunite at the Festival of Lanterns. Chapter 2: Growing Bonds.">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gold: #f5c842; --deep-bg: #08050f; --sannu-color: #4fc3f7; --mossu-color: #ef5350; }
  html, body { height: 100%; width: 100%; background: var(--deep-bg); font-family: 'Lato', sans-serif; color: #eee; overflow: hidden; }

  #stage { position: relative; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; display: flex; align-items: flex-end; justify-content: center; }

  /* Night sky scene */
  .scene { position: absolute; inset: 0; background: linear-gradient(180deg, #06020f 0%, #0d0520 20%, #150a30 40%, #1a0c35 60%, #0e0820 80%, #080510 100%); overflow: hidden; }

  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--dur,3s) infinite ease-in-out; }
  @keyframes twinkle { 0%,100%{opacity:var(--op,.6);transform:scale(1);} 50%{opacity:.1;transform:scale(.5);} }

  /* Moon */
  .moon { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #fffde7, #fff9c4 50%, #ffd54f 80%, transparent 95%); box-shadow: 0 0 50px 15px rgba(255,240,150,.3), 0 0 100px 30px rgba(255,200,80,.15); animation: moonGlow 5s ease-in-out infinite; }
  @keyframes moonGlow { 0%,100%{box-shadow:0 0 50px 15px rgba(255,240,150,.3),0 0 100px 30px rgba(255,200,80,.15);} 50%{box-shadow:0 0 70px 20px rgba(255,240,150,.4),0 0 140px 45px rgba(255,200,80,.22);} }
  .moon-crater { position: absolute; border-radius: 50%; background: rgba(200,180,100,.15); }

  /* Stars cluster / milky way hint */
  .nebula { position: absolute; border-radius: 50%; filter: blur(30px); animation: nebulaPulse 8s ease-in-out infinite; }
  @keyframes nebulaPulse { 0%,100%{opacity:.06;} 50%{opacity:.12;} }

  /* City buildings */
  .building { position: absolute; bottom: 0; border-radius: 3px 3px 0 0; background: linear-gradient(180deg, #1a1030 0%, #0d0820 100%); }
  .win { position: absolute; width: 8px; height: 10px; border-radius: 2px; background: #ffd97a; box-shadow: 0 0 8px #ffd97a; animation: winBlink var(--wb,6s) ease-in-out infinite; }
  @keyframes winBlink { 0%,100%{opacity:.9;} 50%{opacity:.4;} }

  /* Ground */
  .ground-city { position: absolute; bottom: 0; width: 100%; height: 12%; background: linear-gradient(180deg, #120c22 0%, #080510 100%); }

  /* Lanterns hanging */
  .lantern-hang { position: absolute; width: 14px; height: 20px; border-radius: 3px 3px 6px 6px; animation: swing var(--sw,3s) ease-in-out infinite; }
  @keyframes swing { 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg);} }
  .lantern-string { position: absolute; top: 0; height: 1px; background: rgba(200,180,100,.3); }
  .lantern-glow { position: absolute; border-radius: 50%; filter: blur(8px); animation: lanternPulse var(--lp,2s) ease-in-out infinite; }
  @keyframes lanternPulse { 0%,100%{opacity:.4;transform:scale(1);} 50%{opacity:.8;transform:scale(1.2);} }

  /* Fireflies */
  .firefly { position: absolute; width: 5px; height: 5px; border-radius: 50%; background: #ffe082; box-shadow: 0 0 10px 3px #ffd54f; animation: flyAround var(--fdur,6s) ease-in-out infinite; opacity: 0; }
  @keyframes flyAround { 0%{opacity:0;transform:translate(0,0);} 20%{opacity:.9;} 50%{opacity:.6;transform:translate(var(--fx,40px),var(--fy,-30px));} 80%{opacity:.9;} 100%{opacity:0;transform:translate(var(--fx2,-20px),var(--fy2,10px));} }

  /* Petal particles floating */
  .petal { position: absolute; font-size: var(--ps,14px); animation: petalFall var(--pd,8s) linear infinite; opacity: .6; }
  @keyframes petalFall { from{transform:translateY(-50px) rotate(0deg);opacity:.6;} to{transform:translateY(110vh) rotate(360deg);opacity:0;} }

  /* ===== CHARACTERS (same design as Ch1) ===== */
  .char { position: absolute; bottom: 15%; width: 140px; height: 300px; transition: transform .5s cubic-bezier(.34,1.56,.64,1), opacity .4s ease; }
  .char svg { width: 100%; height: 100%; }
  #sannu { left: 20%; }
  #mossu { right: 20%; }
  .char.hidden { opacity: 0; pointer-events: none; transform: translateY(35px); }
  .char.dim { opacity: .28; filter: saturate(.2) brightness(.5); }
  .char.bounce { animation: charBounce .8s cubic-bezier(.34,1.56,.64,1); }
  @keyframes charBounce { 0%{transform:translateY(45px);opacity:0;} 100%{transform:translateY(0);opacity:1;} }
  .char.speak { animation: charSpeak .35s ease; }
  @keyframes charSpeak { 0%{transform:translateY(0);} 35%{transform:translateY(-10px);} 65%{transform:translateY(0);} }

  /* HUD */
  #relwrap { position: absolute; top: 18px; right: 18px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; z-index: 20; }
  .bond-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: #f5c842; text-shadow: 0 0 10px rgba(245,200,66,.7); }
  #relbar { width: 160px; height: 6px; background: rgba(255,255,255,.08); border-radius: 3px; border: 1px solid rgba(255,255,255,.12); overflow: hidden; }
  #relfill { height: 100%; background: linear-gradient(90deg,#ef5350,#f5c842,#4fc3f7); border-radius: 3px; transition: width .8s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 0 8px rgba(245,200,66,.5); }
  .bond-hearts { font-size: 12px; color: #f48fb1; text-shadow: 0 0 6px #f48fb1; }
  #chapterTag { position: absolute; top: 18px; left: 18px; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,.45); border: 1px solid rgba(255,255,255,.12); padding: 6px 14px; border-radius: 20px; background: rgba(0,0,0,.4); backdrop-filter: blur(10px); z-index: 20; }

  /* Dialogue */
  #dialogue { position: absolute; bottom: 0; left: 0; width: 100%; padding: 0 18px 18px; z-index: 20; }
  .dialogue-inner { background: linear-gradient(135deg,rgba(8,5,18,.94),rgba(16,10,32,.96)); border: 1px solid rgba(245,200,66,.18); border-radius: 16px; backdrop-filter: blur(20px); overflow: hidden; box-shadow: 0 -4px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04); position: relative; }
  .dialogue-inner::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--speaker-color,#f5c842),transparent); transition:background .4s ease; }
  #namebox { display:inline-flex; align-items:center; gap:8px; padding:10px 20px 0 20px; font-family:'Cinzel',serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--speaker-color,#f5c842); text-shadow:0 0 12px var(--speaker-color,rgba(245,200,66,.7)); }
  .name-dot { width:6px; height:6px; border-radius:50%; background:var(--speaker-color,#f5c842); box-shadow:0 0 6px var(--speaker-color,#f5c842); animation:dotPulse 1.5s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  #textbox { padding:12px 20px 14px; font-size:15px; line-height:1.7; color:rgba(255,255,255,.88); min-height:70px; max-height:28vh; overflow-y:auto; letter-spacing:.3px; }
  #continueHint { text-align:right; padding:0 20px 14px; font-size:11px; letter-spacing:2px; color:rgba(255,255,255,.35); animation:hintPulse 2s ease-in-out infinite; }
  @keyframes hintPulse { 0%,100%{opacity:.3;} 50%{opacity:.9;} }

  /* Choices */
  #choices { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:radial-gradient(ellipse at center,rgba(8,5,18,.97),rgba(3,2,8,.98)); z-index:30; padding:20px; }
  .choices-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:4px; color:rgba(245,200,66,.55); margin-bottom:8px; }
  .choiceBtn { background:linear-gradient(135deg,rgba(15,10,30,.92),rgba(25,16,45,.92)); border:1px solid rgba(245,200,66,.18); color:rgba(255,255,255,.85); font-family:'Lato',sans-serif; font-size:15px; padding:16px 24px; border-radius:12px; cursor:pointer; width:100%; max-width:450px; text-align:left; transition:all .3s cubic-bezier(.34,1.56,.64,1); position:relative; overflow:hidden; }
  .choiceBtn::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,#f5c842,#ffd97a); opacity:0; transition:opacity .3s; }
  .choiceBtn::after { content:'▶'; position:absolute; right:18px; top:50%; transform:translateY(-50%); font-size:10px; color:#f5c842; opacity:0; transition:opacity .3s,right .3s; }
  .choiceBtn:hover { background:linear-gradient(135deg,rgba(35,22,70,.95),rgba(48,28,80,.95)); border-color:rgba(245,200,66,.5); transform:translateX(8px) scale(1.01); color:#fff; }
  .choiceBtn:hover::before { opacity:1; }
  .choiceBtn:hover::after { opacity:1; right:14px; }

  /* Mini-game */
  #minigame { position:absolute; inset:0; background:radial-gradient(ellipse at center,rgba(12,8,25,.97),rgba(5,3,12,.98)); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; z-index:40; }
  #minigame.hidden { display:none!important; }
  #minigame h3 { font-family:'Cinzel',serif; font-size:16px; letter-spacing:4px; color:#ffd97a; text-shadow:0 0 15px rgba(255,217,122,.5); }
  #minigame p { font-size:13px; color:rgba(255,255,255,.45); letter-spacing:2px; }
  #lanternRow { display:flex; gap:18px; flex-wrap:wrap; justify-content:center; }
  .lanternBtn { width:56px; height:70px; border-radius:8px 8px 14px 14px; background:linear-gradient(180deg,#2a1c0a,#1a0f05); border:2px solid rgba(255,160,60,.3); cursor:pointer; transition:all .3s; position:relative; overflow:hidden; }
  .lanternBtn::before { content:''; position:absolute; inset:0; background:radial-gradient(circle,rgba(255,200,80,0),rgba(255,200,80,0)); transition:background .3s; }
  .lanternBtn.lit { background:linear-gradient(180deg,#ffd97a,#ff9d5c); box-shadow:0 0 25px 8px rgba(255,200,80,.5); border-color:rgba(255,200,80,.8); }
  .lanternBtn.lit::before { background:radial-gradient(circle,rgba(255,240,180,.3),rgba(255,200,80,.1)); }
  #mgScore { font-size:13px; color:rgba(255,217,122,.6); letter-spacing:2px; font-family:'Cinzel',serif; }
  .mg-ornament { width:80px; height:1px; background:linear-gradient(90deg,transparent,#f5c842,transparent); }

  /* Title Card */
  #titlecard { position:absolute; inset:0; background:radial-gradient(ellipse at center,#0d0520 0%,#060210 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:50; transition:opacity 1.5s ease; }
  .title-ornament { width:120px; height:1px; background:linear-gradient(90deg,transparent,#f5c842,transparent); margin:8px 0; }
  #titlecard h1 { font-family:'Cinzel',serif; font-size:42px; letter-spacing:8px; background:linear-gradient(135deg,#ffd97a,#fffde7,#ffd97a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 25px rgba(255,200,80,.55)); }
  #titlecard h2 { font-family:'Cinzel',serif; font-size:13px; letter-spacing:14px; color:rgba(255,255,255,.4); font-weight:400; }
  #titlecard .chapter-name { font-family:'Lato',sans-serif; font-size:14px; letter-spacing:4px; color:#ffd97a; font-weight:300; text-shadow:0 0 15px rgba(255,217,122,.6); }
  #titlecard .start-hint { position:absolute; bottom:38px; font-size:12px; letter-spacing:3px; color:rgba(255,255,255,.25); animation:hintPulse 2.5s ease-in-out infinite; }
  .title-particle { position:absolute; width:3px; height:3px; border-radius:50%; animation:titleFloat var(--dur3,5s) ease-in-out infinite; }
  @keyframes titleFloat { 0%,100%{transform:translateY(0) translateX(0) scale(1);opacity:0;} 20%{opacity:.7;} 50%{transform:translateY(-80px) translateX(var(--tx,20px)) scale(1.5);opacity:.9;} 80%{opacity:.3;} }
  #titlecard.fadeout { opacity:0; pointer-events:none; }

  .hidden { display:none!important; }
  #textbox::-webkit-scrollbar { width:4px; }
  #textbox::-webkit-scrollbar-thumb { background:rgba(245,200,66,.3); border-radius:2px; }
  .ripple { position:absolute; border-radius:50%; width:20px; height:20px; background:rgba(255,217,122,.2); pointer-events:none; animation:rippleOut .6s ease-out forwards; transform:translate(-50%,-50%); }
  @keyframes rippleOut { to{width:90px;height:90px;opacity:0;} }
</style>
</head>

    <div class="chapter-name">CHAPTER II — GROWING BONDS</div>

</div>
<script>
// Generate stars, fireflies, title particles
(function(){
  const scene=document.getElementById('scene');
  for(let i=0;i<90;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+0.5;
    const col=Math.random()>.85?`rgba(255,220,150,${Math.random()*.5+.3})`:'#fff';
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*55}%;left:${Math.random()*100}%;--dur:${Math.random()*4+2}s;--op:${Math.random()*.5+.15};animation-delay:${Math.random()*5}s;background:${col};`;
    scene.appendChild(s);
  }
  for(let i=0;i<10;i++){
    const f=document.createElement('div'); f.className='firefly';
    f.style.cssText=`left:${18+Math.random()*64}%;bottom:${12+Math.random()*40}%;--fdur:${4+Math.random()*7}s;--fx:${(Math.random()-.5)*90}px;--fy:${-18-Math.random()*45}px;--fx2:${(Math.random()-.5)*70}px;--fy2:${(Math.random()-.5)*35}px;animation-delay:${Math.random()*7}s;`;
    scene.appendChild(f);
  }
  const tc=document.getElementById('titlecard');
  const colors=['#ffd97a','#ff9d5c','#f5c842','#fff9c4'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div'); p.className='title-particle';
    p.style.cssText=`left:${Math.random()*100}%;bottom:${Math.random()*65}%;--dur3:${4+Math.random()*5}s;--tx:${(Math.random()-.5)*60}px;animation-delay:${Math.random()*5}s;background:${colors[Math.floor(Math.random()*colors.length)]};`;
    tc.appendChild(p);
  }
})();

// Audio
const actx=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,type='sine',vol=0.1,slideTo=null){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type; o.frequency.value=freq;
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,actx.currentTime+dur);
  g.gain.value=vol;
  g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime+dur);
}
const sfx={
  click:()=>beep(600,0.06,'sine',0.04,900),
  choice:()=>{beep(440,0.1,'triangle',0.06,540);setTimeout(()=>beep(660,0.1,'triangle',0.04,760),80);},
  bond:()=>{beep(523,0.2,'sine',0.08);setTimeout(()=>beep(659,0.25,'sine',0.08),130);setTimeout(()=>beep(784,0.3,'sine',0.06),280);},
  enter:()=>beep(330,0.4,'triangle',0.05,528),
  whoosh:()=>beep(200,0.35,'sawtooth',0.025,80),
  lantern:()=>beep(740,0.15,'triangle',0.1,990),
  win:()=>{[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.25,'sine',0.08),i*120));}
};
let musicTimer=null;
function startMusic(){
  const notes=[349,392,440,523,440,392,349,330];
  let i=0;
  musicTimer=setInterval(()=>{
    beep(notes[i%notes.length]/2,1.2,'sine',0.016);
    if(i%3===0) beep(notes[(i+3)%notes.length]/4,2,'sine',0.008);
    i++;
  },900);
}

// Story
const story=[
  {speaker:'narration',text:"A few weeks have passed since Promise Park. Word has spread of the upcoming Festival of Lanterns, and Sannu and Mossu agreed to meet at the town square to help set up."},
  {speaker:'narration',text:"The square buzzes with preparation — strings of lanterns wait to be lit, stalls are being decorated, and a warm golden glow is beginning to fill the cobblestone streets.",show:'mossu'},
  {speaker:'mossu',text:"Sannu! Over here — they need help lighting the lanterns before the sun sets completely."},
  {speaker:'narration',text:"Sannu jogs over, adjusting her glasses, a small notebook tucked under her arm.",show:'sannu'},
  {speaker:'sannu',text:"I brought a diagram. If we light them in the right order, the whole string glows evenly instead of in clumps."},
  {speaker:'mossu',text:"...Of course you made a diagram. Okay, Professor — lead the way!"},
  {speaker:'narration',text:"Sannu pulls out a small circuit device with color-coded switches. A lantern puzzle appears.",minigame:true},
  {speaker:'narration',text:"The lanterns flicker to life one by one, casting a warm golden glow across the square. A few townsfolk nearby clap softly.",branch:'mg'},
  {speaker:'mossu',text:"Whoa... it actually worked. You're kind of amazing, you know that?",branch:'mg'},
  {speaker:'sannu',text:"I— it's just basic circuitry. Nothing special.",branch:'mg',sfx:'bond'},
  {speaker:'mossu',text:"Don't do that. Don't shrink what you just did. It was special.",branch:'mg'},
  {speaker:'narration',text:"Sannu looks away, cheeks warm under the lantern light, unsure how to respond.",choices:[
    {text:'✦  "...Thank you, Mossu." (smile softly)',rel:+10,next:'a'},
    {text:'✧  "Stop teasing me!" (playful deflect)',rel:+5,next:'b'}
  ]},
  {speaker:'sannu',text:"...Thank you, Mossu.",branch:'a'},
  {speaker:'mossu',text:"See? Was that so hard?",branch:'a',sfx:'bond'},
  {speaker:'sannu',text:"Stop teasing me! ...But thanks. I guess.",branch:'b'},
  {speaker:'mossu',text:"Ha! There she is.",branch:'b'},
  {speaker:'narration',text:"As the last lantern flickers on, the square fills with warm light and laughter. Somewhere nearby, a street musician begins to play a gentle melody."},
  {speaker:'mossu',text:"Hey, Sannu... when we're older — do you think we'll still be doing stuff like this together?"},
  {speaker:'sannu',text:"I'd like that. Whatever happens... I want you in my future, Mossu.",choices:[
    {text:'✦  Reach out and hold his hand',rel:+15,next:'hand'},
    {text:'✧  Just smile — keep it as a quiet promise',rel:+8,next:'smile'}
  ]},
  {speaker:'narration',text:"Sannu reaches out, and Mossu takes her hand without hesitation. Neither says anything else — they don't need to.",branch:'hand',sfx:'bond'},
  {speaker:'narration',text:"Sannu just smiles, and Mossu smiles back. Some promises don't need words.",branch:'smile'},
  {speaker:'narration',text:"Above them, the lanterns drift gently in the night breeze — tiny points of light against the dark, like a sky full of wishes waiting to be made."},
  {speaker:'narration',text:"✦  — END OF CHAPTER 2 —  ✦",end:true}
];

let idx=0,relationship=30,currentBranch=null,started=false;
try{const s=localStorage.getItem('sm_bond');if(s!==null)relationship=parseInt(s,10);}catch(e){}
const SANNU_COLOR='#4fc3f7',MOSSU_COLOR='#ef5350',NARR_COLOR='#ffd97a';
const textbox=document.getElementById('textbox'),nametext=document.getElementById('nametext'),namebox=document.getElementById('namebox');
const dialogueInner=namebox.closest('.dialogue-inner'),choicesDiv=document.getElementById('choices');
const sannuEl=document.getElementById('sannu'),mossuEl=document.getElementById('mossu');
const relfill=document.getElementById('relfill'),bondHearts=document.getElementById('bondHearts'),continueHint=document.getElementById('continueHint');
const minigameDiv=document.getElementById('minigame'),lanternRow=document.getElementById('lanternRow'),mgScore=document.getElementById('mgScore');

function updateRelBar(){
  const pct=Math.max(0,Math.min(100,relationship));
  relfill.style.width=pct+'%';
  bondHearts.textContent=pct>=80?'♥ ♥ ♥':pct>=50?'♥ ♥ ♡':pct>=20?'♥ ♡ ♡':'♡ ♡ ♡';
}
function showChar(who){
  const el=who==='sannu'?sannuEl:mossuEl;
  el.classList.remove('hidden');
  el.classList.add('bounce');
  setTimeout(()=>el.classList.remove('bounce'),800);
  sfx.whoosh();
}
function highlightSpeaker(speaker){
  [sannuEl,mossuEl].forEach(el=>el.classList.remove('dim','speak'));
  if(speaker==='sannu'){if(!mossuEl.classList.contains('hidden'))mossuEl.classList.add('dim');sannuEl.classList.add('speak');}
  if(speaker==='mossu'){if(!sannuEl.classList.contains('hidden'))sannuEl.classList.add('dim');mossuEl.classList.add('speak');}
}
function setNamebox(speaker){
  const color=speaker==='sannu'?SANNU_COLOR:speaker==='mossu'?MOSSU_COLOR:NARR_COLOR;
  dialogueInner.style.setProperty('--speaker-color',color);
  nametext.textContent={sannu:'Sannu',mossu:'Mossu',narration:'Narration'}[speaker]||'Narration';
}
let typeTimer=null;
function typeText(text){
  if(typeTimer)clearTimeout(typeTimer);
  textbox.textContent='';
  let i=0;
  function next(){if(i<text.length){textbox.textContent+=text[i++];textbox.scrollTop=textbox.scrollHeight;typeTimer=setTimeout(next,20);}}
  next();
}
function findNextIndex(from){
  let i=from;
  while(i<story.length){const n=story[i];if(n.branch===undefined||n.branch===currentBranch)return i;i++;}
  return i;
}
function startMinigame(){
  minigameDiv.classList.remove('hidden');
  continueHint.classList.add('hidden');
  lanternRow.innerHTML='';
  let lit=0; const total=6;
  for(let i=0;i<total;i++){
    const b=document.createElement('div'); b.className='lanternBtn';
    b.innerHTML=`<div style="font-size:24px;text-align:center;padding-top:12px;">🏮</div>`;
    b.onclick=()=>{
      if(b.classList.contains('lit'))return;
      b.classList.add('lit');
      sfx.lantern(); lit++;
      mgScore.textContent=`${lit} / ${total} lanterns lit ✦`;
      if(lit===total){
        sfx.win(); relationship+=10; updateRelBar();
        setTimeout(()=>{minigameDiv.classList.add('hidden');continueHint.classList.remove('hidden');idx=findNextIndex(idx+1);renderNode();},900);
      }
    };
    lanternRow.appendChild(b);
  }
}
function renderNode(){
  if(idx>=story.length)return;
  const node=story[idx];
  if(node.show)showChar(node.show);
  highlightSpeaker(node.speaker);
  setNamebox(node.speaker);
  typeText(node.text);
  if(node.sfx==='bond'){setTimeout(()=>{sfx.bond();relationship+=5;updateRelBar();},200);}
  if(node.end){continueHint.textContent='✦ Chapter 2 Complete ✦';try{localStorage.setItem('sm_bond',String(relationship));}catch(e){}return;}
  if(node.minigame){continueHint.classList.add('hidden');setTimeout(startMinigame,600);return;}
  if(node.choices){
    continueHint.classList.add('hidden');
    choicesDiv.classList.remove('hidden');
    choicesDiv.innerHTML='';
    const t=document.createElement('div');t.className='choices-title';t.textContent='— MAKE YOUR CHOICE —';choicesDiv.appendChild(t);
    node.choices.forEach(choice=>{
      const btn=document.createElement('button');btn.className='choiceBtn';btn.textContent=choice.text;
      btn.onclick=()=>{sfx.choice();relationship+=choice.rel||0;updateRelBar();currentBranch=choice.next;choicesDiv.classList.add('hidden');continueHint.classList.remove('hidden');idx=findNextIndex(idx+1);renderNode();};
      choicesDiv.appendChild(btn);
    });
  } else {continueHint.classList.remove('hidden');}
}
function advance(){
  if(!started){started=true;document.getElementById('titlecard').classList.add('fadeout');startMusic();sfx.enter();setTimeout(renderNode,400);return;}
  const node=story[idx];
  if(node.end)return;
  if(node.choices||node.minigame)return;
  sfx.click();
  idx=findNextIndex(idx+1);
  renderNode();
}
document.getElementById('stage').addEventListener('click',function(e){
  if(e.target.classList.contains('choiceBtn')||e.target.classList.contains('lanternBtn')||e.target.closest('.lanternBtn'))return;
  const r=document.createElement('div');r.className='ripple';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';
  document.getElementById('stage').appendChild(r);setTimeout(()=>r.remove(),600);
  advance();
});
updateRelBar();
</script>
