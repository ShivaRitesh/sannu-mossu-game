<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sannu &amp; Mossu: Echoes of Destiny — Chapter 3</title>
<meta name="description" content="The Festival of Dreams. Sannu and Mossu share a night that will change everything. Chapter 3.">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gold: #f5c842; --deep-bg: #04020a; --sannu-color: #4fc3f7; --mossu-color: #ef5350; }
  html, body { height: 100%; width: 100%; background: var(--deep-bg); font-family: 'Lato', sans-serif; color: #eee; overflow: hidden; }
  #stage { position: relative; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; display: flex; align-items: flex-end; justify-content: center; }

  /* ===== DEEP NIGHT / FESTIVAL SCENE ===== */
  .scene { position: absolute; inset: 0; background: linear-gradient(180deg, #020108 0%, #08041a 20%, #100630 40%, #180a3a 55%, #0e0625 75%, #060310 100%); overflow: hidden; }
  .star { position: absolute; border-radius: 50%; animation: twinkle var(--dur,3s) infinite ease-in-out; }
  @keyframes twinkle { 0%,100%{opacity:var(--op,.7);transform:scale(1);} 50%{opacity:.1;transform:scale(.5);} }

  /* Large romantic moon */
  .moon { position: absolute; top: 4%; left: 50%; transform: translateX(-50%); width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #fffde7, #fff9c4 45%, #ffd54f 75%, transparent 92%); box-shadow: 0 0 60px 20px rgba(255,240,150,.35), 0 0 120px 40px rgba(255,200,80,.2), 0 0 200px 60px rgba(200,150,50,.1); animation: moonGlow 6s ease-in-out infinite; }
  @keyframes moonGlow { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.1);} }

  /* Moon reflection path on ground */
  .moon-reflect { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); width: 40px; height: 80px; background: linear-gradient(180deg, rgba(255,240,150,.15), transparent); border-radius: 50%; filter: blur(6px); }

  /* Milky Way band */
  .milky-way { position: absolute; top: 0; left: 0; right: 0; height: 50%; background: linear-gradient(105deg, transparent 20%, rgba(180,120,255,.04) 40%, rgba(150,100,255,.06) 50%, rgba(180,120,255,.04) 60%, transparent 80%); pointer-events: none; }

  /* Nebula clouds */
  .nebula { position: absolute; border-radius: 50%; filter: blur(35px); animation: nebulaPulse 10s ease-in-out infinite; }
  @keyframes nebulaPulse { 0%,100%{opacity:.05;} 50%{opacity:.12;} }

  /* Fireworks burst (CSS only) */
  .firework { position: absolute; pointer-events: none; }
  .fw-burst { position: absolute; border-radius: 50%; animation: fwExplode var(--fwd,1.2s) ease-out forwards; }
  @keyframes fwExplode { 0%{transform:scale(0);opacity:1;} 100%{transform:scale(1);opacity:0;} }
  .fw-spark { position: absolute; width: 3px; height: 3px; border-radius: 50%; animation: fwSpark var(--fsd,1s) ease-out forwards; }
  @keyframes fwSpark { 0%{transform:translate(0,0);opacity:1;} 100%{transform:translate(var(--sx,40px),var(--sy,-40px));opacity:0;} }

  /* Festival lights / bokeh */
  .bokeh { position: absolute; border-radius: 50%; animation: bokehFloat var(--bd,6s) ease-in-out infinite; filter: blur(var(--bb,3px)); }
  @keyframes bokehFloat { 0%,100%{transform:translateY(0) scale(1);opacity:var(--bo,.3);} 50%{transform:translateY(-20px) scale(1.1);opacity:calc(var(--bo,.3)*1.5);} }

  /* Hanging lanterns (more, denser for festival) */
  .lantern-hang { position: absolute; animation: swing var(--sw,3s) ease-in-out infinite; }
  @keyframes swing { 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg);} }

  /* Ground tiles (festival cobblestone) */
  .ground-festival { position: absolute; bottom: 0; width: 100%; height: 12%; background: linear-gradient(180deg, #1a0e28 0%, #0a0615 100%); }
  .cobble { position: absolute; bottom: 12%; border-radius: 3px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05); }

  /* Temple / pagoda silhouette in bg */
  .pagoda { position: absolute; bottom: 12%; }
  .pagoda-tier { position: absolute; background: #0d0820; }
  .pagoda-roof { position: absolute; border-style: solid; border-color: transparent transparent #0d0820 transparent; }

  /* City far bg */
  .city-bg { position: absolute; bottom: 12%; width: 100%; height: 30%; opacity: .4; }
  .city-sil { position: absolute; bottom: 0; background: #08051a; border-radius: 2px 2px 0 0; }

  /* Floating petals / confetti */
  .petal { position: absolute; animation: petalFall var(--pd,9s) linear infinite; }
  @keyframes petalFall { from{transform:translateY(-60px) rotate(0deg) translateX(0);opacity:.7;} to{transform:translateY(110vh) rotate(720deg) translateX(var(--px,30px));opacity:0;} }

  /* Heart particles (for kiss scene) */
  .heart-float { position: absolute; font-size: var(--hs,16px); animation: heartRise var(--hd,2s) ease-out forwards; pointer-events: none; z-index: 25; }
  @keyframes heartRise { 0%{transform:translateY(0) scale(0) rotate(-15deg);opacity:0;} 20%{opacity:1;transform:translateY(-20px) scale(1.2) rotate(10deg);} 80%{opacity:.8;transform:translateY(var(--hy,-120px)) scale(.8) rotate(-5deg);} 100%{opacity:0;transform:translateY(var(--hy2,-180px)) scale(.5);} }

  /* Sparkle overlay (for romantic moment) */
  .sparkle-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 22; animation: sparkleShow 0.5s ease-in; }
  .sp { position: absolute; font-size: var(--ss,12px); animation: spTwinkle var(--std,1s) ease-out forwards; }
  @keyframes spTwinkle { 0%{opacity:0;transform:scale(0);} 40%{opacity:1;transform:scale(1.5);} 100%{opacity:0;transform:scale(0);} }

  /* Kiss flash overlay */
  #kissFlash { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(255,200,220,.4), rgba(255,160,200,.1), transparent 70%); z-index: 21; opacity: 0; pointer-events: none; transition: opacity .6s; }
  #kissFlash.active { opacity: 1; }

  /* ===== CHARACTERS ===== */
  .char { position: absolute; bottom: 14%; width: 140px; height: 300px; transition: transform 0.5s cubic-bezier(.34,1.56,.64,1), opacity .4s ease; }
  .char svg { width: 100%; height: 100%; }
  #sannu { left: 22%; }
  #mossu { right: 22%; }
  /* Close together mode for romantic scene */
  #sannu.close { left: 32%; }
  #mossu.close { right: 32%; }
  .char.hidden { opacity: 0; pointer-events: none; transform: translateY(35px); }
  .char.dim { opacity: .28; filter: saturate(.2) brightness(.5); }
  .char.bounce { animation: charBounce .8s cubic-bezier(.34,1.56,.64,1); }
  @keyframes charBounce { 0%{transform:translateY(45px);opacity:0;} 100%{transform:translateY(0);opacity:1;} }
  .char.speak { animation: charSpeak .35s ease; }
  @keyframes charSpeak { 0%{transform:translateY(0);} 35%{transform:translateY(-10px);} 65%{transform:translateY(0);} }
  .char.romance-glow { filter: drop-shadow(0 0 25px rgba(255,180,200,.6)); }

  /* ===== HUD ===== */
  #relwrap { position: absolute; top: 18px; right: 18px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; z-index: 20; }
  .bond-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: #f5c842; text-shadow: 0 0 10px rgba(245,200,66,.7); }
  #relbar { width: 160px; height: 6px; background: rgba(255,255,255,.08); border-radius: 3px; border: 1px solid rgba(255,255,255,.12); overflow: hidden; }
  #relfill { height: 100%; background: linear-gradient(90deg,#ef5350,#f48fb1,#f5c842,#4fc3f7); border-radius: 3px; transition: width .8s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 0 10px rgba(245,200,66,.5); }
  .bond-hearts { font-size: 14px; color: #f48fb1; text-shadow: 0 0 8px #f48fb1; animation: heartbeat 2s ease-in-out infinite; }
  @keyframes heartbeat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
  #chapterTag { position: absolute; top: 18px; left: 18px; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,.45); border: 1px solid rgba(255,255,255,.12); padding: 6px 14px; border-radius: 20px; background: rgba(0,0,0,.4); backdrop-filter: blur(10px); z-index: 20; }

  /* ===== DIALOGUE ===== */
  #dialogue { position: absolute; bottom: 0; left: 0; width: 100%; padding: 0 18px 18px; z-index: 20; }
  .dialogue-inner { background: linear-gradient(135deg,rgba(8,4,18,.94),rgba(18,8,35,.96)); border: 1px solid rgba(245,200,66,.18); border-radius: 16px; backdrop-filter: blur(20px); overflow: hidden; box-shadow: 0 -4px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04); position: relative; }
  .dialogue-inner::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--speaker-color,#f5c842),transparent); transition:background .4s ease; }
  #namebox { display:inline-flex; align-items:center; gap:8px; padding:10px 20px 0 20px; font-family:'Cinzel',serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--speaker-color,#f5c842); text-shadow:0 0 12px var(--speaker-color,rgba(245,200,66,.7)); }
  .name-dot { width:6px; height:6px; border-radius:50%; background:var(--speaker-color,#f5c842); box-shadow:0 0 6px var(--speaker-color,#f5c842); animation:dotPulse 1.5s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  #textbox { padding:12px 20px 14px; font-size:15px; line-height:1.7; color:rgba(255,255,255,.9); min-height:70px; max-height:28vh; overflow-y:auto; letter-spacing:.3px; }
  #continueHint { text-align:right; padding:0 20px 14px; font-size:11px; letter-spacing:2px; color:rgba(255,255,255,.35); animation:hintPulse 2s ease-in-out infinite; }
  @keyframes hintPulse { 0%,100%{opacity:.3;} 50%{opacity:.9;} }

  /* ===== CHOICES ===== */
  #choices { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:radial-gradient(ellipse at center,rgba(8,4,18,.97),rgba(3,1,8,.98)); z-index:30; padding:20px; }
  .choices-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:4px; color:rgba(244,143,177,.6); margin-bottom:8px; }
  .choiceBtn { background:linear-gradient(135deg,rgba(15,8,30,.92),rgba(28,12,45,.92)); border:1px solid rgba(244,143,177,.2); color:rgba(255,255,255,.85); font-family:'Lato',sans-serif; font-size:15px; padding:16px 24px; border-radius:12px; cursor:pointer; width:100%; max-width:450px; text-align:left; transition:all .3s cubic-bezier(.34,1.56,.64,1); position:relative; overflow:hidden; }
  .choiceBtn::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,#f48fb1,#f5c842); opacity:0; transition:opacity .3s; }
  .choiceBtn::after { content:'♥'; position:absolute; right:18px; top:50%; transform:translateY(-50%); font-size:12px; color:#f48fb1; opacity:0; transition:opacity .3s,right .3s; }
  .choiceBtn:hover { background:linear-gradient(135deg,rgba(40,15,55,.95),rgba(55,18,65,.95)); border-color:rgba(244,143,177,.5); transform:translateX(8px) scale(1.01); color:#fff; }
  .choiceBtn:hover::before { opacity:1; }
  .choiceBtn:hover::after { opacity:1; right:14px; }

  /* ===== TITLE CARD ===== */
  #titlecard { position:absolute; inset:0; background:radial-gradient(ellipse at center,#0a0418 0%,#030108 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:50; transition:opacity 1.5s ease; }
  .title-ornament { width:120px; height:1px; background:linear-gradient(90deg,transparent,#f5c842,transparent); margin:8px 0; }
  #titlecard h1 { font-family:'Cinzel',serif; font-size:42px; letter-spacing:8px; background:linear-gradient(135deg,#f48fb1,#f5c842,#f48fb1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 25px rgba(244,143,177,.55)); }
  #titlecard h2 { font-family:'Cinzel',serif; font-size:13px; letter-spacing:14px; color:rgba(255,255,255,.4); font-weight:400; }
  #titlecard .chapter-name { font-family:'Lato',sans-serif; font-size:14px; letter-spacing:4px; color:#f48fb1; font-weight:300; text-shadow:0 0 15px rgba(244,143,177,.6); }
  #titlecard .start-hint { position:absolute; bottom:38px; font-size:12px; letter-spacing:3px; color:rgba(255,255,255,.25); animation:hintPulse 2.5s ease-in-out infinite; }
  .title-particle { position:absolute; border-radius:50%; animation:titleFloat var(--dur3,5s) ease-in-out infinite; }
  @keyframes titleFloat { 0%,100%{transform:translateY(0) translateX(0) scale(1);opacity:0;} 20%{opacity:.7;} 50%{transform:translateY(-80px) translateX(var(--tx,20px)) scale(1.5);opacity:.9;} 80%{opacity:.3;} }
  #titlecard.fadeout { opacity:0; pointer-events:none; }

  .hidden { display:none!important; }
  #textbox::-webkit-scrollbar { width:4px; }
  #textbox::-webkit-scrollbar-thumb { background:rgba(244,143,177,.3); border-radius:2px; }
  .ripple { position:absolute; border-radius:50%; width:20px; height:20px; background:rgba(244,143,177,.2); pointer-events:none; animation:rippleOut .6s ease-out forwards; transform:translate(-50%,-50%); }
  @keyframes rippleOut { to{width:90px;height:90px;opacity:0;} }
</style>
</head>

// Audio
const actx=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,type='sine',vol=0.1,slideTo=null){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type; o.frequency.value=freq;
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,actx.currentTime+dur);
  g.gain.value=vol; g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
  o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+dur);
}
const sfx={
  click:()=>beep(600,0.06,'sine',0.04,900),
  choice:()=>{beep(440,0.1,'triangle',0.06,540);setTimeout(()=>beep(660,0.1,'triangle',0.04,760),80);},
  bond:()=>{beep(523,0.2,'sine',0.08);setTimeout(()=>beep(659,0.25,'sine',0.08),130);setTimeout(()=>beep(784,0.3,'sine',0.06),280);},
  enter:()=>beep(330,0.4,'triangle',0.05,528),
  whoosh:()=>beep(200,0.35,'sawtooth',0.025,80),
  kiss:()=>{
    beep(784,0.4,'sine',0.08); setTimeout(()=>beep(988,0.5,'sine',0.07),200);
    setTimeout(()=>beep(1175,0.6,'sine',0.06),450); setTimeout(()=>beep(1568,0.8,'sine',0.05),750);
  },
  romance:()=>{
    [523,659,784,880,988].forEach((f,i)=>setTimeout(()=>beep(f,0.3,'sine',0.06),i*200));
  },
  heartbeat:()=>{beep(80,0.1,'sine',0.12);setTimeout(()=>beep(80,0.08,'sine',0.1),180);}
};
let musicTimer=null;
function startMusic(){
  const notes=[392,440,523,587,659,784,880,784,659,587,523,440];
  let i=0;
  musicTimer=setInterval(()=>{
    beep(notes[i%notes.length]/2,1.4,'sine',0.014);
    if(i%3===0) beep(notes[(i+4)%notes.length]/4,2.2,'sine',0.007);
    if(i%6===0) beep(notes[(i+8)%notes.length]/2,0.8,'triangle',0.006);
    i++;
  },750);
}

// Heart particles
function spawnHearts(count=6){
  const stage=document.getElementById('stage');
  const cx=window.innerWidth/2;
  const cy=window.innerHeight/2;
  const emojis=['💕','💗','💖','💝','💞','🌸','✨'];
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const h=document.createElement('div'); h.className='heart-float';
      const em=emojis[Math.floor(Math.random()*emojis.length)];
      const x=cx+(Math.random()-.5)*300;
      const hy=-100-Math.random()*100;
      h.style.cssText=`left:${x}px;bottom:${window.innerHeight*.35}px;font-size:${16+Math.random()*14}px;--hd:${1.5+Math.random()*1.5}s;--hy:${hy}px;--hy2:${hy-60}px;`;
      h.textContent=em;
      stage.appendChild(h);
      setTimeout(()=>h.remove(),3000);
    },i*120);
  }
}

  {speaker:'mossu',text:"Yeah?",branch:'conf'},
  {speaker:'sannu',text:"...Can we do that again? Some time. Eventually. If you want.",branch:'conf',sfx:'bond'},
  {speaker:'mossu',text:"...Any time you want, Sannu.",branch:'conf'},
  // deflect branch
  {speaker:'mossu',text:"I know what I want. I want to know what you want.",branch:'deflect'},
  {speaker:'sannu',text:"That's not a fair answer.",branch:'deflect'},
  {speaker:'mossu',text:"No, but it's an honest one.",branch:'deflect'},
  {speaker:'narration',text:"The lanterns keep rising. The music keeps playing. And somewhere between this breath and the next, Sannu makes a decision.",branch:'deflect',onEnter:'bringClose'},
  {speaker:'sannu',text:"Okay. I... want to keep being your friend. And more than that. I don't know the exact words yet.",branch:'deflect'},
  {speaker:'mossu',text:"That's enough. That's more than enough.",branch:'deflect',sfx:'bond'},
  {speaker:'narration',text:"He takes her hand. She doesn't pull away. Above them, the lanterns rise and rise.",branch:'deflect'},
  {speaker:'mossu',text:"Hey Sannu. Can I try something?",branch:'deflect'},
  {speaker:'sannu',text:"...What kind of something?",branch:'deflect'},
  {speaker:'narration',text:"He leans close. Slowly. Giving her time to say no. She doesn't.",branch:'deflect',onEnter:'kissScene'},
  {speaker:'narration',text:"His lips brush her cheek — light as a petal, warm as the lantern light. It lasts only a second. But it changes everything.",branch:'deflect'},
  {speaker:'sannu',text:"...That was my cheek.",branch:'deflect'},
  {speaker:'mossu',text:"I know. Is that okay?",branch:'deflect'},
  {speaker:'sannu',text:"...Ask me again sometime. On my lips.",branch:'deflect',sfx:'bond'},
  {speaker:'mossu',text:"I'll hold you to that.",branch:'deflect'},
  // Merge: both branches end here
  {speaker:'narration',text:"They stay at the river's edge long after the lanterns have faded from sight. The music softens. The festival crowd thins."},
  {speaker:'mossu',text:"Sannu..."},
  {speaker:'sannu',text:"Hmm?"},
  {speaker:'mossu',text:"I want to protect this. Whatever this is. Whatever we're becoming. I want to protect it."},
  {speaker:'sannu',text:"So do I. ...But the world doesn't always let things stay beautiful."},
  {speaker:'narration',text:"A strange wind passes through the square. The lanterns shudder. For just a moment — one cold, wrong moment — the festival lights flicker."},
  {speaker:'narration',text:"Far at the edge of the city, on the roof of the highest tower, a shadow watches the celebration below. A masked figure. Still. Patient."},
  {speaker:'narration',text:"Lord Veyron smiles beneath his mask."},
  {speaker:'narration',text:"\"So these are the ones the prophecy speaks of. Let them enjoy their little festival... while it lasts.\""},
  {speaker:'narration',text:"The wind dies. The lights settle. Sannu shivers — just a little.",sfx:'bond'},
  {speaker:'mossu',text:"Hey. You okay?"},
  {speaker:'sannu',text:"Yeah. Just... a strange feeling. Like something's watching."},
  {speaker:'mossu',text:"Nothing's getting near you. I promise."},
  {speaker:'narration',text:"He says it so simply. Like it's the easiest truth in the world."},
  {speaker:'sannu',text:"...I know you mean that. That's why I believe you."},
  {speaker:'narration',text:"The last lantern rises into the sky — just one, left over, launching itself silently upward. They both watch until it disappears into the stars."},
  {speaker:'narration',text:"✦  — END OF CHAPTER 3 —  ✦\n\nThe story continues...",end:true}
];

let idx=0,relationship=30,currentBranch=null,started=false;
try{const s=localStorage.getItem('sm_bond');if(s!==null)relationship=parseInt(s,10);}catch(e){}
const SANNU_COLOR='#4fc3f7',MOSSU_COLOR='#ef5350',NARR_COLOR='#f48fb1';
const textbox=document.getElementById('textbox'),nametext=document.getElementById('nametext'),namebox=document.getElementById('namebox');
const dialogueInner=namebox.closest('.dialogue-inner'),choicesDiv=document.getElementById('choices');
const sannuEl=document.getElementById('sannu'),mossuEl=document.getElementById('mossu');
const relfill=document.getElementById('relfill'),bondHearts=document.getElementById('bondHearts'),continueHint=document.getElementById('continueHint');

function updateRelBar(){
  const pct=Math.max(0,Math.min(100,relationship));
  relfill.style.width=pct+'%';
  bondHearts.textContent=pct>=80?'♥ ♥ ♥':pct>=50?'♥ ♥ ♡':pct>=20?'♥ ♡ ♡':'♡ ♡ ♡';
}
function showChar(who){
  const el=who==='sannu'?sannuEl:mossuEl;
  el.classList.remove('hidden');
  el.classList.add('bounce');
  setTimeout(()=>el.classList.remove('bounce'),800);
  sfx.whoosh();
}
function highlightSpeaker(speaker){
  [sannuEl,mossuEl].forEach(el=>el.classList.remove('dim','speak'));
  if(speaker==='sannu'){if(!mossuEl.classList.contains('hidden'))mossuEl.classList.add('dim');sannuEl.classList.add('speak');}
  if(speaker==='mossu'){if(!sannuEl.classList.contains('hidden'))sannuEl.classList.add('dim');mossuEl.classList.add('speak');}
}
function setNamebox(speaker){
  const color=speaker==='sannu'?SANNU_COLOR:speaker==='mossu'?MOSSU_COLOR:NARR_COLOR;
  dialogueInner.style.setProperty('--speaker-color',color);
  nametext.textContent={sannu:'Sannu',mossu:'Mossu',narration:'Narration'}[speaker]||'Narration';
}
let typeTimer=null;
function typeText(text){
  if(typeTimer)clearTimeout(typeTimer);
  textbox.textContent='';
  let i=0;
  function next(){if(i<text.length){textbox.textContent+=text[i++];textbox.scrollTop=textbox.scrollHeight;typeTimer=setTimeout(next,20);}}
  next();
}
function findNextIndex(from){
  let i=from;
  while(i<story.length){const n=story[i];if(n.branch===undefined||n.branch===currentBranch)return i;i++;}
  return i;
}
function handleOnEnter(key){
  if(key==='bringClose'){
    bringClose();
    addRomanceGlow();
    sfx.romance();
  }
  if(key==='kissScene'){
    kissFlash();
    spawnHearts(10);
    sfx.kiss();
    setTimeout(()=>sfx.heartbeat(),600);
  }
}
function renderNode(){
  if(idx>=story.length)return;
  const node=story[idx];
  if(node.show)showChar(node.show);
  if(node.onEnter)handleOnEnter(node.onEnter);
  highlightSpeaker(node.speaker);
  setNamebox(node.speaker);
  typeText(node.text);
  if(node.sfx==='bond'){setTimeout(()=>{sfx.bond();relationship+=5;updateRelBar();},200);}
  if(node.end){
    continueHint.textContent='✦ To be continued... ✦';
    try{localStorage.setItem('sm_bond',String(relationship));}catch(e){}
    return;
  }
  if(node.choices){
    continueHint.classList.add('hidden');
    choicesDiv.classList.remove('hidden');
    choicesDiv.innerHTML='';
    const t=document.createElement('div');t.className='choices-title';t.textContent='— FOLLOW YOUR HEART —';choicesDiv.appendChild(t);
    node.choices.forEach(choice=>{
      const btn=document.createElement('button');btn.className='choiceBtn';btn.textContent=choice.text;
      btn.onclick=()=>{sfx.choice();relationship+=choice.rel||0;updateRelBar();currentBranch=choice.next;choicesDiv.classList.add('hidden');continueHint.classList.remove('hidden');idx=findNextIndex(idx+1);renderNode();};
      choicesDiv.appendChild(btn);
    });
  } else {continueHint.classList.remove('hidden');}
}
function advance(){
  if(!started){started=true;document.getElementById('titlecard').classList.add('fadeout');startMusic();sfx.enter();setTimeout(renderNode,400);return;}
  const node=story[idx];
  if(node.end)return; // Future ch4
  if(node.choices)return;
  sfx.click();
  idx=findNextIndex(idx+1);
  renderNode();
}
document.getElementById('stage').addEventListener('click',function(e){
  if(e.target.classList.contains('choiceBtn'))return;
  const r=document.createElement('div');r.className='ripple';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';
  document.getElementById('stage').appendChild(r);setTimeout(()=>r.remove(),600);
  advance();
});
updateRelBar();
</script>
</body>
</html>
