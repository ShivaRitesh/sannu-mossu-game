<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sannu &amp; Mossu: Echoes of Destiny — Chapter 1</title>
<meta name="description" content="A cinematic visual novel RPG. Follow Sannu and Mossu as their destiny unfolds. Chapter 1: The Promise Park.">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #f5c842;
    --blue-glow: #7fd1ff;
    --red-glow: #ff7070;
    --deep-bg: #0a0714;
    --sannu-color: #4fc3f7;
    --mossu-color: #ef5350;
  }
  html, body { height: 100%; width: 100%; background: var(--deep-bg); font-family: 'Lato', sans-serif; color: #eee; overflow: hidden; }

  #stage { position: relative; width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; display: flex; align-items: flex-end; justify-content: center; }

  .scene { position: absolute; inset: 0; background: linear-gradient(180deg, #0d1a0a 0%, #1a2e10 20%, #2a4a1e 40%, #1c3a2a 65%, #0e2018 85%, #060e0a 100%); overflow: hidden; }

  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--dur, 3s) infinite ease-in-out; opacity: var(--op, 0.6); }
  @keyframes twinkle { 0%, 100% { opacity: var(--op, 0.6); transform: scale(1); } 50% { opacity: 0.1; transform: scale(0.5); } }

  .sun { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, #fffde7, #fff9c4 30%, #ffd54f 60%, #ff8f00 80%, transparent 95%); box-shadow: 0 0 80px 30px rgba(255,210,50,0.4), 0 0 160px 60px rgba(255,160,0,0.2), 0 0 240px 80px rgba(255,120,0,0.08); animation: sunPulse 4s ease-in-out infinite; }
  @keyframes sunPulse { 0%,100%{box-shadow:0 0 80px 30px rgba(255,210,50,.4),0 0 160px 60px rgba(255,160,0,.2);} 50%{box-shadow:0 0 100px 40px rgba(255,210,50,.55),0 0 200px 80px rgba(255,160,0,.28);} }

  /* Sun rays */
  .sun-ray { position: absolute; top: 5%; left: 50%; transform-origin: bottom center; width: 3px; background: linear-gradient(180deg, rgba(255,220,80,0.15), transparent); border-radius: 3px; animation: rayRotate 20s linear infinite; }
  @keyframes rayRotate { from{transform:translateX(-50%) rotate(0deg);} to{transform:translateX(-50%) rotate(360deg);} }

  .cloud { position: absolute; border-radius: 50px; background: rgba(255,255,240,0.06); filter: blur(10px); animation: drift var(--dur, 30s) linear infinite; }
  @keyframes drift { from{transform:translateX(-220px);} to{transform:translateX(110vw);} }

  /* Layered hills */
  .hills-back { position: absolute; bottom: 0; width: 110%; height: 48%; left: -5%; background: linear-gradient(180deg, #0d2010 0%, #071408 100%); border-radius: 60% 60% 0 0 / 80% 80% 0 0; }
  .hills-mid { position: absolute; bottom: 0; width: 110%; height: 34%; left: -5%; background: linear-gradient(180deg, #142b16 0%, #0a1a0a 100%); border-radius: 50% 50% 0 0 / 100% 100% 0 0; }
  .hills-front { position: absolute; bottom: 0; width: 110%; height: 22%; left: -5%; background: linear-gradient(180deg, #1c3820 0%, #0e1f12 100%); border-radius: 30% 70% 0 0 / 50% 50% 0 0; }
  .ground { position: absolute; bottom: 0; width: 100%; height: 10%; background: linear-gradient(180deg, #1a3a1e 0%, #0a1a0c 100%); }

  /* Trees */
  .tree-group { position: absolute; bottom: 10%; display: flex; flex-direction: column; align-items: center; }
  .tree-leaves { border-radius: 50%; box-shadow: 0 0 25px rgba(30,80,40,0.5); }
  .tree-trunk { background: linear-gradient(180deg, #3d2c1e, #2a1f14); border-radius: 3px; }

  /* Grass blades */
  .grass { position: absolute; bottom: 10%; width: 3px; border-radius: 3px 3px 0 0; animation: grassSway var(--gd,2.5s) ease-in-out infinite; transform-origin: bottom center; }
  @keyframes grassSway { 0%,100%{transform:rotate(-6deg);} 50%{transform:rotate(6deg);} }

  /* Park path */
  .park-path { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 22%; background: linear-gradient(180deg, rgba(180,150,100,0.15), rgba(180,150,100,0.08)); border-radius: 10px 10px 0 0; }

  /* Park bench */
  .bench { position: absolute; bottom: 17%; left: 50%; transform: translateX(-50%); width: 130px; height: 50px; }
  .bench-back { position: absolute; top: -18px; left: 0; right: 0; height: 15px; background: linear-gradient(180deg, #6d4c41, #4e342e); border-radius: 4px; box-shadow: 0 3px 10px rgba(0,0,0,0.5); }
  .bench-seat { position: absolute; top: 0; left: 0; right: 0; height: 14px; background: linear-gradient(180deg, #6d4c41, #4e342e); border-radius: 4px; box-shadow: 0 3px 10px rgba(0,0,0,0.5); }
  .bench-leg { position: absolute; bottom: 0; width: 10px; height: 30px; background: #3e2723; border-radius: 3px; }
  .bench-leg.left { left: 12px; } .bench-leg.right { right: 12px; }

  /* Flowers */
  .flower { position: absolute; bottom: 10%; font-size: var(--size,16px); animation: sway var(--dur2,2.5s) ease-in-out infinite; opacity: 0.85; }
  @keyframes sway { 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg);} }

  /* Fireflies */
  .firefly { position: absolute; width: 5px; height: 5px; border-radius: 50%; background: #ffe082; box-shadow: 0 0 10px 3px #ffd54f; animation: flyAround var(--fdur,6s) ease-in-out infinite; opacity: 0; }
  @keyframes flyAround { 0%{opacity:0;transform:translate(0,0);} 20%{opacity:.9;} 50%{opacity:.6;transform:translate(var(--fx,40px),var(--fy,-30px));} 80%{opacity:.9;} 100%{opacity:0;transform:translate(var(--fx2,-20px),var(--fy2,10px));} }

  /* Butterflies */
  .butterfly { position: absolute; animation: flutter var(--bd,4s) ease-in-out infinite; font-size: var(--bs,20px); }
  @keyframes flutter { 0%{transform:translate(0,0) rotate(-5deg);} 25%{transform:translate(20px,-15px) rotate(5deg);} 50%{transform:translate(40px,0) rotate(-3deg);} 75%{transform:translate(20px,10px) rotate(4deg);} 100%{transform:translate(0,0) rotate(-5deg);} }

  /* ===== CHARACTERS ===== */
  .char { position: absolute; bottom: 17%; width: 140px; height: 300px; transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease; }
  .char svg { width: 100%; height: 100%; }
  #sannu { left: 20%; }
  #mossu { right: 20%; }
  .char.hidden { opacity: 0; pointer-events: none; transform: translateY(35px); }
  .char.dim { opacity: 0.28; filter: saturate(0.2) brightness(0.5); }
  .char.bounce { animation: charBounce 0.8s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes charBounce { 0%{transform:translateY(45px);opacity:0;} 100%{transform:translateY(0);opacity:1;} }
  .char.speak { animation: charSpeak 0.35s ease; }
  @keyframes charSpeak { 0%{transform:translateY(0);} 35%{transform:translateY(-10px);} 65%{transform:translateY(0);} }

  /* ===== HUD ===== */
  #relwrap { position: absolute; top: 18px; right: 18px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; z-index: 20; }
  .bond-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: #f5c842; text-shadow: 0 0 10px rgba(245,200,66,0.7); }
  #relbar { width: 160px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; border: 1px solid rgba(255,255,255,0.12); overflow: hidden; }
  #relfill { height: 100%; background: linear-gradient(90deg, #ef5350, #f5c842, #4fc3f7); border-radius: 3px; transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 0 8px rgba(245,200,66,0.5); }
  .bond-hearts { font-size: 12px; color: #f48fb1; text-shadow: 0 0 6px #f48fb1; }
  #chapterTag { position: absolute; top: 18px; left: 18px; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.12); padding: 6px 14px; border-radius: 20px; background: rgba(0,0,0,0.35); backdrop-filter: blur(10px); z-index: 20; }

  /* ===== DIALOGUE ===== */
  #dialogue { position: absolute; bottom: 0; left: 0; width: 100%; padding: 0 18px 18px; z-index: 20; }
  .dialogue-inner { background: linear-gradient(135deg, rgba(8,5,18,0.94), rgba(16,10,32,0.96)); border: 1px solid rgba(245,200,66,0.18); border-radius: 16px; backdrop-filter: blur(20px); overflow: hidden; box-shadow: 0 -4px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04); position: relative; }
  .dialogue-inner::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--speaker-color,#f5c842),transparent); transition:background 0.4s ease; }
  #namebox { display:inline-flex; align-items:center; gap:8px; padding:10px 20px 0 20px; font-family:'Cinzel',serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--speaker-color,#f5c842); text-shadow:0 0 12px var(--speaker-color,rgba(245,200,66,.7)); }
  .name-dot { width:6px; height:6px; border-radius:50%; background:var(--speaker-color,#f5c842); box-shadow:0 0 6px var(--speaker-color,#f5c842); animation:dotPulse 1.5s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  #textbox { padding:12px 20px 14px; font-size:15px; line-height:1.7; color:rgba(255,255,255,0.88); min-height:70px; max-height:28vh; overflow-y:auto; letter-spacing:0.3px; }
  #continueHint { text-align:right; padding:0 20px 14px; font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.35); animation:hintPulse 2s ease-in-out infinite; }
  @keyframes hintPulse { 0%,100%{opacity:.3;} 50%{opacity:.9;} }

  /* ===== CHOICES ===== */
  #choices { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:radial-gradient(ellipse at center,rgba(8,5,18,.97),rgba(3,2,8,.98)); z-index:30; padding:20px; }
  .choices-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:4px; color:rgba(245,200,66,.55); margin-bottom:8px; }
  .choiceBtn { background:linear-gradient(135deg,rgba(15,10,30,.92),rgba(25,16,45,.92)); border:1px solid rgba(245,200,66,.18); color:rgba(255,255,255,.85); font-family:'Lato',sans-serif; font-size:15px; padding:16px 24px; border-radius:12px; cursor:pointer; width:100%; max-width:450px; text-align:left; transition:all .3s cubic-bezier(.34,1.56,.64,1); position:relative; overflow:hidden; backdrop-filter:blur(10px); box-shadow:0 4px 20px rgba(0,0,0,.35); }
  .choiceBtn::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,#f5c842,#4fc3f7); opacity:0; transition:opacity .3s; }
  .choiceBtn::after { content:'▶'; position:absolute; right:18px; top:50%; transform:translateY(-50%); font-size:10px; color:#f5c842; opacity:0; transition:opacity .3s,right .3s; }
  .choiceBtn:hover { background:linear-gradient(135deg,rgba(35,22,70,.95),rgba(48,28,80,.95)); border-color:rgba(245,200,66,.5); transform:translateX(8px) scale(1.01); box-shadow:0 6px 30px rgba(0,0,0,.5),0 0 20px rgba(245,200,66,.07); color:#fff; }
  .choiceBtn:hover::before { opacity:1; }
  .choiceBtn:hover::after { opacity:1; right:14px; }

  /* ===== TITLE CARD ===== */
  #titlecard { position:absolute; inset:0; background:radial-gradient(ellipse at center,#0d1a08 0%,#060e04 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:50; transition:opacity 1.5s ease; }
  .title-ornament { width:120px; height:1px; background:linear-gradient(90deg,transparent,#f5c842,transparent); margin:8px 0; }
  #titlecard h1 { font-family:'Cinzel',serif; font-size:42px; letter-spacing:8px; background:linear-gradient(135deg,#f5c842,#fffde7,#f5c842); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 25px rgba(245,200,66,.55)); }
  #titlecard h2 { font-family:'Cinzel',serif; font-size:13px; letter-spacing:14px; color:rgba(255,255,255,.45); font-weight:400; }
  #titlecard .chapter-name { font-family:'Lato',sans-serif; font-size:14px; letter-spacing:4px; color:#a5d6a7; font-weight:300; text-shadow:0 0 15px rgba(165,214,167,.6); }
  #titlecard .start-hint { position:absolute; bottom:38px; font-size:12px; letter-spacing:3px; color:rgba(255,255,255,.28); animation:hintPulse 2.5s ease-in-out infinite; }
  .title-particle { position:absolute; width:3px; height:3px; border-radius:50%; background:#f5c842; opacity:.6; animation:titleFloat var(--dur3,5s) ease-in-out infinite; }
  @keyframes titleFloat { 0%,100%{transform:translateY(0) translateX(0) scale(1);opacity:0;} 20%{opacity:.6;} 50%{transform:translateY(-80px) translateX(var(--tx,20px)) scale(1.5);opacity:.8;} 80%{opacity:.3;} }
  #titlecard.fadeout { opacity:0; pointer-events:none; }

  .hidden { display:none !important; }
  #textbox::-webkit-scrollbar { width:4px; }
  #textbox::-webkit-scrollbar-thumb { background:rgba(245,200,66,.3); border-radius:2px; }

  .ripple { position:absolute; border-radius:50%; width:20px; height:20px; background:rgba(245,200,66,.25); pointer-events:none; animation:rippleOut .6s ease-out forwards; transform:translate(-50%,-50%); }
  @keyframes rippleOut { to{width:90px;height:90px;opacity:0;} }
</style>
</head>
<body>

    <div class="sun-ray" style="height:200px;left:calc(50% - 1px);top:10%;transform-origin:top center;animation-duration:25s;opacity:.4;"></div>
    <!-- Clouds -->
    <div class="cloud" style="width:200px;height:55px;top:20%;left:-5%;--dur:38s;"></div>

    <div class="tree-group" style="left:3%">
      <div class="tree-leaves" style="width:75px;height:75px;background:radial-gradient(circle,#2e7d32,#1b5e20);"></div>

    </div>
    <div class="tree-group" style="left:10%">

    <div class="grass" style="left:20%;height:15px;background:#388e3c;--gd:2.4s;animation-delay:.5s;"></div>

    <div class="flower" style="left:28%;--size:18px;--dur2:2.2s;">🌸</div>

    <div class="flower" style="left:57%;--size:17px;--dur2:2.8s;animation-delay:1s;">🌸</div>

    <div class="flower" style="left:18%;--size:14px;--dur2:3.2s;animation-delay:.8s;">🌼</div>

      <div class="bench-leg left"></div>
      <div class="bench-leg right"></div>
    </div>
  </div>

  <!-- ===== SANNU — Fair skin, black ponytail, blue glasses, light blue hoodie ===== -->

<script>

    tc.appendChild(p);

// Audio
const actx=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,type='sine',vol=0.1,slideTo=null){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type; o.frequency.value=freq;
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,actx.currentTime+dur);
  g.gain.value=vol;
  g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime+dur);
}
const sfx={
  click:()=>beep(600,0.06,'sine',0.04,900),
  choice:()=>{beep(440,0.1,'triangle',0.06,540);setTimeout(()=>beep(660,0.1,'triangle',0.04,760),80);},
  bond:()=>{beep(523,0.2,'sine',0.08);setTimeout(()=>beep(659,0.25,'sine',0.08),130);setTimeout(()=>beep(784,0.3,'sine',0.06),280);},
  enter:()=>beep(330,0.4,'triangle',0.05,528),
  whoosh:()=>beep(200,0.35,'sawtooth',0.025,80)
};
let musicTimer=null;
function startMusic(){
  const notes=[392,440,523,587,659,784,659,587,523,440];
  let i=0;
  musicTimer=setInterval(()=>{
    beep(notes[i%notes.length]/2,1.2,'sine',0.016);
    if(i%4===0) beep(notes[(i+5)%notes.length]/4,2,'sine',0.009);
    i++;
  },800);
}

// Story
const story=[
  {speaker:'narration',text:"Sunlight spills through the ancient oak trees of Promise Park. Cherry blossoms drift lazily on the warm breeze — and on a quiet wooden bench, two strangers are about to change each other's lives forever."},
  {speaker:'narration',text:"A small girl with glasses too big for her face stares intently at a butterfly that has landed on her knee. She barely breathes, afraid to startle it.",show:'sannu'},
  {speaker:'sannu',text:"...It's not flying away. Maybe it likes me."},
  {speaker:'narration',text:"A few steps away, a boy with a worn silver bracelet on his left wrist watches with quiet curiosity. He tilts his head, noticing something she hasn't.",show:'mossu'},
  {speaker:'mossu',text:"Hey... is that butterfly hurt? Its wing looks a little bent."},
  {speaker:'sannu',text:"I— I don't know. I was just looking at it."},
  {speaker:'mossu',text:"Can I see? My grandpa taught me how to fix small wings. Sort of."},
  {speaker:'narration',text:"Sannu hesitates. This stranger seems kind — but she's always been more comfortable with books than with people.",choices:[
    {text:'✦  Let him help with the butterfly',rel:+10,next:1},
    {text:'✧  Pull back — "I\'d rather do it myself."',rel:-5,next:0}
  ]},
  {speaker:'sannu',text:"I'd rather do it myself, thank you.",branch:0},
  {speaker:'mossu',text:"Oh— okay. Sorry. I just thought... never mind.",branch:0},
  {speaker:'narration',text:"He looks down, a little hurt, and quietly sits back on his end of the bench. The butterfly flutters off on its own a moment later.",branch:0},
  {speaker:'sannu',text:"...Wait. Thank you for asking, at least.",branch:0},
  {speaker:'mossu',text:"No problem. I'm Mossu, by the way.",branch:0},
  {speaker:'sannu',text:"Sannu.",branch:0},
  {speaker:'sannu',text:"...Okay. Just be careful.",branch:1},
  {speaker:'narration',text:"Mossu gently cups his hands around the butterfly. With surprising gentleness — and a focus that surprises her — he carefully straightens its delicate wing.",branch:1},
  {speaker:'mossu',text:"There. Good as new, little guy.",branch:1},
  {speaker:'narration',text:"The butterfly flutters into the air, circles them once, and disappears into the sunlit trees. Sannu watches with wide eyes.",branch:1},
  {speaker:'sannu',text:"That was... amazing. How did you do that?",branch:1},
  {speaker:'mossu',text:"Practice, I guess! I'm Mossu.",branch:1},
  {speaker:'sannu',text:"I'm Sannu. Nice to meet you, Mossu.",branch:1,sfx:'bond'},
  {speaker:'narration',text:"For a while, neither says much. But something invisible has shifted — a small thread now connects two strangers on a sunlit bench."},
  {speaker:'mossu',text:"So... do you come here a lot? To this park?",choices:[
    {text:'✦  "Every day after lessons. It\'s quiet here."',rel:+5,next:2},
    {text:'✧  "First time, actually. I got a little lost."',rel:+5,next:2}
  ]},
  {speaker:'sannu',text:"Maybe... maybe we could sit here again sometime? If you wanted to.",branch:2},
  {speaker:'mossu',text:"Yeah. I'd really like that. Same bench, same time tomorrow?",branch:2},
  {speaker:'sannu',text:"...Promise?",branch:2},
  {speaker:'mossu',text:"Promise.",branch:2,sfx:'bond'},
  {speaker:'narration',text:"Neither of them knows it yet — but this small promise, made on an ordinary golden afternoon, will echo across the rest of their lives."},
  {speaker:'narration',text:"✦  — END OF CHAPTER 1 —  ✦",end:true}
];

let idx=0,relationship=30,currentBranch=null,started=false;
const SANNU_COLOR='#4fc3f7',MOSSU_COLOR='#ef5350',NARR_COLOR='#a5d6a7';
const textbox=document.getElementById('textbox'),nametext=document.getElementById('nametext'),namebox=document.getElementById('namebox');
const dialogueInner=namebox.closest('.dialogue-inner'),choicesDiv=document.getElementById('choices');
const sannuEl=document.getElementById('sannu'),mossuEl=document.getElementById('mossu');
const relfill=document.getElementById('relfill'),bondHearts=document.getElementById('bondHearts'),continueHint=document.getElementById('continueHint');

function updateRelBar(){
  const pct=Math.max(0,Math.min(100,relationship));
  relfill.style.width=pct+'%';
  bondHearts.textContent=pct>=80?'♥ ♥ ♥':pct>=50?'♥ ♥ ♡':pct>=20?'♥ ♡ ♡':'♡ ♡ ♡';
}
function showChar(who){
  const el=who==='sannu'?sannuEl:mossuEl;
  el.classList.remove('hidden');
  el.classList.add('bounce');
  setTimeout(()=>el.classList.remove('bounce'),800);
  sfx.whoosh();
}
function highlightSpeaker(speaker){
  [sannuEl,mossuEl].forEach(el=>el.classList.remove('dim','speak'));
  if(speaker==='sannu'){if(!mossuEl.classList.contains('hidden'))mossuEl.classList.add('dim');sannuEl.classList.add('speak');}
  if(speaker==='mossu'){if(!sannuEl.classList.contains('hidden'))sannuEl.classList.add('dim');mossuEl.classList.add('speak');}
}
function setNamebox(speaker){
  const color=speaker==='sannu'?SANNU_COLOR:speaker==='mossu'?MOSSU_COLOR:NARR_COLOR;
  dialogueInner.style.setProperty('--speaker-color',color);
  nametext.textContent={sannu:'Sannu',mossu:'Mossu',narration:'Narration'}[speaker]||'Narration';
}
let typeTimer=null;
function typeText(text){
  if(typeTimer) clearTimeout(typeTimer);
  textbox.textContent='';
  let i=0;
  function next(){if(i<text.length){textbox.textContent+=text[i++];textbox.scrollTop=textbox.scrollHeight;typeTimer=setTimeout(next,20);}}
  next();
}
function findNextIndex(from){
  let i=from;
  while(i<story.length){const n=story[i];if(n.branch===undefined||n.branch===currentBranch)return i;i++;}
  return i;
}
function renderNode(){
  if(idx>=story.length)return;
  const node=story[idx];
  if(node.show)showChar(node.show);
  highlightSpeaker(node.speaker);
  setNamebox(node.speaker);
  typeText(node.text);
  if(node.sfx==='bond'){setTimeout(()=>{sfx.bond();relationship+=5;updateRelBar();},200);}
  if(node.end){continueHint.textContent='✦ click to continue to Chapter 2 ✦';try{localStorage.setItem('sm_bond',String(relationship));}catch(e){}return;}
  if(node.choices){
    continueHint.classList.add('hidden');
    choicesDiv.classList.remove('hidden');
    const title=choicesDiv.querySelector('.choices-title');
    choicesDiv.innerHTML='';
    const t=document.createElement('div');t.className='choices-title';t.textContent='— MAKE YOUR CHOICE —';choicesDiv.appendChild(t);
    node.choices.forEach(choice=>{
      const btn=document.createElement('button');btn.className='choiceBtn';btn.textContent=choice.text;
      btn.onclick=()=>{sfx.choice();relationship+=choice.rel||0;updateRelBar();currentBranch=choice.next;choicesDiv.classList.add('hidden');continueHint.classList.remove('hidden');idx=findNextIndex(idx+1);renderNode();};
      choicesDiv.appendChild(btn);
    });
  } else {continueHint.classList.remove('hidden');}
}
function advance(){
  if(!started){started=true;document.getElementById('titlecard').classList.add('fadeout');startMusic();sfx.enter();setTimeout(renderNode,400);return;}
  const node=story[idx];
  if(node.end){window.location.href='sannu_mossu_chapter2.html';return;}
  if(node.choices)return;
  sfx.click();
  idx=findNextIndex(idx+1);
  renderNode();
}
document.getElementById('stage').addEventListener('click',function(e){
  if(e.target.classList.contains('choiceBtn'))return;
  const r=document.createElement('div');r.className='ripple';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';
  document.getElementById('stage').appendChild(r);setTimeout(()=>r.remove(),600);
  advance();
});
updateRelBar();
</script>
</body>
</html>
